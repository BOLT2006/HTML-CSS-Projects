<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile Card</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Boxicon -->
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

     <script src="https://kit.fontawesome.com/2357e725d8.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="profile-card">
        <div class="image">
        <img src="profile-card-img.jpg" alt="profile_card_image" class="profile-img">
        </div>
        <div class="text-data">
            <span class="name">CodingLab</span>
            <span class="job">Youtuber&Blogger</span>
        </div>
        <div class="media-button">
            <a href="#" class="link">
                 <i class="fa-brands fa-twitter"></i>
            </a>
            <a href="#" class="link">
                 <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="#" class="link">
                 <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="link">
                 <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
        <div class="buttons">
            <button class="button"> Subscribe</button>
            <button class="button"> Message</button>
        </div>

    </div>
</body>
</html>
