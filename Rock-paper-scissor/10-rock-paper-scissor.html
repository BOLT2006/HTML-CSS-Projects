<!DOCTYPE html>
<html>
  <head>
    <title class="title">Rock Paper Scissors</title>
    <link rel="stylesheet" href="10-rock-paper-scissor.css">
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    " class="move-button">
    <img class = "move-icon" src="rock-emoji.png" alt="Rock">
    </button>

    <button onclick="
      playGame('paper');
    " class="move-button">
    <img  class = "move-icon" src="paper-emoji.png" alt="Paper">
    </button>

    <button onclick="
      playGame('scissors');
    " class="move-button">
    <img class = "move-icon" src="scissors-emoji.png" alt="Scissors">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves">
    </p>
    <p class="js-score score"></p>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    " class="reset-score-button">Reset Score</button>

    <script src="10-rock-paper-scissors.js"></script>
  </body>
</html>
